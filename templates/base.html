<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DE+Grund:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Firefly.png') }}">
    <title>Akim Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent': '#2dd4bf',
                        'accent-dark': '#0f766e',
                        'card': '#111111',
                        'dark': '#0a0a0a'
                    },
                    fontFamily: {
                        'mono': ['"IBM Plex Mono"', 'monospace'],
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'signature': ['"Playwrite DE Grund"', 'cursive']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class=" text-gray-300 font-sans antialiased"
      style="background-image: url('{{ url_for('static', filename='images/background.webp') }}'); background-size: cover; background-attachment: fixed; background-position: center;">

    <!-- Voile sombre pour lisibilité (optionnel) -->
    <div class="fixed inset-0 bg-black/55 pointer-events-none z-0"></div>

    <!-- Navigation fixe -->
    <nav id="navbar" class="fixed top-0 w-full z-50 bg-black/80 border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
            <img src="{{ url_for('static', filename='images/Firefly.png') }}" alt="Logo" class="h-6 w-auto rounded-full">
            <span class="signature-name text-2xl md:text-3xl text-white">AKIM RATIARISON</span>
        </div>
            <div class="hidden md:flex gap-8 text-sm uppercase tracking-wide">
                <a href="#hero" class="nav-link">Accueil</a>
                <a href="#projets" class="nav-link">Projets</a>
                <a href="#certifs" class="nav-link">Certifications</a>
                <a href="#expertise" class="nav-link">Expertise</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
             <button id="menu-btn" class="md:hidden text-gray-300 focus:outline-none">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
        </div>
        <!-- Menu mobile -->
        <div id="mobile-menu" class="hidden md:hidden bg-dark/35 backdrop-blur-md border-t border-white/5 py-3 text-center">
            <a href="#hero" class="block px-6 py-2 hover:bg-white/5">Accueil</a>
            <a href="#projets" class="block px-6 py-2 hover:bg-white/5">Projets</a>
            <a href="#certifs" class="block px-6 py-2 hover:bg-white/5">Certifications</a>
            <a href="#expertise" class="block px-6 py-2 hover:bg-white/5">Expertise</a>
            <a href="#contact" class="block px-6 py-2 hover:bg-white/5">Contact</a>
        </div>
    </nav>

    <main class="relative z-10 max-w-6xl mx-auto px-6 pt-28 pb-16">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-8 text-sm text-gray-500 border-t border-white/5 text-white">
        <p>Akim Ratiarison  data Analyst & AI Student ©2026</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
</body>
</html>
