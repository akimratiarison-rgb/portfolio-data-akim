{# templates/base.html #}
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akim | Data Analyst & AI Student</title>
    
    <!-- Tailwind CSS CDN + configuration manuelle -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'bebas': ['"Bebas Neue"', 'sans-serif'],
                        'mono': ['"IBM Plex Mono"', 'monospace'],
                        'sans': ['"Inter"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        'dark-bg': '#0f0f0f'',
                        'card-bg': '#0f0f0f',
                        'accent': '#f6faf0ec',
                        'accent-dark': '#b3997c',
                        'muted': '#9ca3af',
                    },
                    animation: {
                        'grain': 'grain 8s steps(10) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        grain: {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '10%': { transform: 'translate(-2%, -1%)' },
                            '20%': { transform: 'translate(1%, -2%)' },
                            '30%': { transform: 'translate(-1%, 2%)' },
                            '40%': { transform: 'translate(2%, 1%)' },
                            '50%': { transform: 'translate(-2%, -1%)' },
                            '60%': { transform: 'translate(1%, 1%)' },
                            '70%': { transform: 'translate(-1%, -1%)' },
                            '80%': { transform: 'translate(2%, 2%)' },
                            '90%': { transform: 'translate(-2%, 1%)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Polices Google -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS (animations + composants personnalisés) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="text-gray-200 font-sans antialiased overflow-x-hidden relative min-h-screen">

    <!-- Image de fond 1 (départ) -->
    <div id="bg1" class="fixed inset-0 bg-cover bg-center transition-opacity duration-1000 z-0"
         style="background-image: url('{{ url_for('static', filename='images/fond1.jpg') }}'); opacity: 1;">
    </div>

    <!-- Image de fond 2 (arrivée) -->
    <div id="bg2" class="fixed inset-0 bg-cover bg-center transition-opacity duration-1000 z-0"
         style="background-image: url('{{ url_for('static', filename='images/fond2.jpg') }}'); opacity: 0;">
    </div>

    <!-- Voile sombre pour lisibilité (optionnel) -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-smpointer-events-none z-0"></div>
    
    <!-- Navigation fixe avec burger mobile -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4 bg-black/70 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-mono text-3xl tracking-widest uppercase">AKIM RATIARISON<span class="text-accent"></span></div>
            
            <!-- Desktop menu -->
            <div class="hidden md:flex gap-10 font-debas text-xs uppercase tracking-[0.2em]">
                <a href="#hero" class="hover:text-accent transition-colors">Accueil</a>
                <a href="#projets" class="hover:text-accent transition-colors">Projets</a>
                <a href="#certifs" class="hover:text-accent transition-colors">Certifications</a>
            </div>
            
            <!-- Mobile burger button -->
            <button id="menu-btn" class="md:hidden text-gray-300 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile menu (hidden by default) -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4 flex flex-col gap-4 font-mono text-sm uppercase tracking-wider text-center bg-black/80 backdrop-blur-lg rounded-2xl">
            <a href="#hero" class="hover:text-accent py-2">Accueil</a>
            <a href="#projets" class="hover:text-accent py-2">Projets</a>
            <a href="#certifs" class="hover:text-accent py-2">Certifications</a>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto px-6 md:px-8 lg:px-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-12 text-muted text-xs font-mono border-t border-white/5 mt-24">
        <p>Data Analyst & AI Student <span class="text-accent">Akim Ratiarison copyright 2026</span></p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
